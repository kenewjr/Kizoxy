<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Kizoxy Dashboard</title>
    <link rel="stylesheet" href="/app.css" />
    <meta name="robots" content="noindex" />
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.9/dist/cdn.min.js"
    ></script>
  </head>
  <body>
    <div id="sidebar-overlay"></div>
    <aside id="sidebar">
      <div id="bot-info"></div>
      <nav id="nav"></nav>
      <div
        id="sidebar-filter-container"
        style="
          padding: 10px 16px;
          display: none;
          border-top: 1px solid var(--border);
        "
      >
        <div style="position: relative">
          <input
            id="sidebar-guild-filter"
            class="input btn--sm"
            placeholder="Filter guilds..."
            style="width: 100%; padding-right: 24px"
          />
          <button
            id="sidebar-guild-filter-clear"
            style="
              position: absolute;
              right: 8px;
              top: 50%;
              transform: translateY(-50%);
              background: transparent;
              border: none;
              color: var(--text-3);
              cursor: pointer;
              display: none;
            "
          >
            ×
          </button>
        </div>
      </div>
      <div id="sidebar-footer"></div>
    </aside>
    <div id="main">
      <header id="topbar">
        <button id="sidebar-toggle" aria-label="Toggle sidebar">☰</button>
        <span
          id="page-title"
          style="font-weight: 600; font-size: 15px; flex: 1"
        ></span>
        <span
          id="last-updated"
          style="font-size: 12px; color: var(--text-3)"
        ></span>
        <button
          class="btn btn--ghost btn--sm"
          id="help-shortcuts-btn"
          title="Keyboard Shortcuts"
          style="margin-right: 4px"
        >
          ?
        </button>
        <button class="btn btn--ghost btn--sm" id="refresh-btn">
          ↻ Refresh
        </button>
      </header>
      <div id="content"></div>
    </div>
    <div id="toast-container" class="toast-container"></div>
    <script src="/app.js"></script>
    <script src="/components.js"></script>
    <script src="/pages-overview.js"></script>
    <script src="/pages-guilds.js"></script>
    <script src="/pages-guild-core.js"></script>
    <script src="/pages-guild-notif.js"></script>
    <script src="/pages-guild-system.js"></script>
    <script src="/pages-guild-sendmsg.js"></script>
    <script src="/pages-logs.js"></script>
    <script src="/pages-admin.js"></script>
    <script src="/commandsTab.js"></script>
  </body>
</html>
