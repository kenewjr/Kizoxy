name: Deploy to Server

on:
  push:
    branches: [main, master]
  workflow_dispatch: # Manual trigger

jobs:
  deploy:
    name: Deploy via Ansible
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Install Ansible
        run: |
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Create Ansible inventory
        run: |
          cat > /tmp/inventory.yml << EOF
          all:
            hosts:
              production:
                ansible_host: ${{ secrets.SERVER_HOST }}
                ansible_user: ${{ secrets.SERVER_USER }}
                ansible_port: ${{ secrets.SERVER_PORT || 22 }}
                ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
          EOF

      - name: Run Ansible deployment
        run: |
          ansible-playbook \
            -i /tmp/inventory.yml \
            .github/ansible/playbook.yml \
            --extra-vars "app_repo=${{ github.repository }} app_branch=${{ github.ref_name }}"
        env:
          ANSIBLE_HOST_KEY_CHECKING: "false"
