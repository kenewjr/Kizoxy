name: CI — Lint & Validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: ESLint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"


      - name: Install dependencies
        run: npm install

      - name: Run ESLint
        run: npm run lint

  validate:
    name: Syntax Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"


      - name: Install dependencies
        run: npm install

      - name: Validate main entry point
        run: node --check index.js

      - name: Validate deploy script
        run: node --check deploySlash.js

      - name: Validate commands
        run: find commands -type f -name "*.js" -exec node --check {} \;
