name: Dependabot Auto-Merge

on:
  workflow_run:
    workflows: ["CI — Lint & Validate"]
    types:
      - completed

permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success' &&
      (github.event.workflow_run.triggering_actor.login == 'dependabot[bot]' || github.event.workflow_run.actor.login == 'dependabot[bot]') &&
      github.event.workflow_run.pull_requests[0] != null
    steps:
      - name: Approve and Merge Dependabot PR
        run: |
          gh pr approve "$PR_URL"
          gh pr merge --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.workflow_run.pull_requests[0].html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
